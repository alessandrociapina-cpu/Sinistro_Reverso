name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test
